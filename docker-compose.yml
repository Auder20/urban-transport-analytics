services:

  nginx:
    build: ./nginx
    ports: ['80:80', '443:443']
    depends_on: [frontend, backend]
    networks: [uta-net]
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost/api
    networks: [uta-net]
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://uta:secret@postgres:5432/uta_db
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/uta_logs?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ANALYTICS_URL=http://analytics:8000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [uta-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  analytics:
    build: ./analytics
    environment:
      - DATABASE_URL=postgresql://uta:secret@postgres:5432/uta_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [uta-net]
    restart: unless-stopped

  # ── Seed service ────────────────────────────────────────────────────────────
  # Runs once automatically on first docker compose up.
  # Uses a named volume flag to skip if already seeded.
  # Safe to re-run manually: docker compose run --rm seed
  seed:
    build: ./backend
    command: >
      sh -c "
        echo '⏳ Waiting for PostgreSQL...' &&
        until pg_isready -h postgres -U uta; do sleep 1; done &&
        echo '✅ PostgreSQL ready' &&
        node scripts/seed-db.js
      "
    environment:
      - DATABASE_URL=postgresql://uta:secret@postgres:5432/uta_db
      - MONGODB_URI=mongodb://mongo:27017/uta_logs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    networks: [uta-net]
    # restart: no — runs once and exits
    profiles: [seed]

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: uta
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: uta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uta -d uta_db']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [uta-net]
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: uta_logs
    volumes:
      - mongo_data:/data/db
    networks: [uta-net]
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [uta-net]
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  uta-net:
    driver: bridge