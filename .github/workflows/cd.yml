name: Continuous Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run comprehensive tests
        run: |
          echo "🧪 Running comprehensive test suite..."
          npm run test:backend
          npm run test:analytics
          npm run test:frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-compose.prod.yml
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'pull_request' || github.event.inputs.environment == 'staging'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          
          # Deploy to staging server with health checks
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.STAGING_DEPLOY_TOKEN }}" \
            -H "Content-type: application/json" \
            -d '{
              "image_tag": "${{ needs.test-and-build.outputs.image-tag }}",
              "environment": "staging",
              "commit_sha": "${{ github.sha }}"
            }' \
            ${{ secrets.STAGING_DEPLOY_API_URL }}
          
          # Wait for deployment completion
          echo "⏳ Waiting for staging deployment..."
          timeout 300 bash -c 'until curl -f ${{ secrets.STAGING_URL }}/api/health; do sleep 10; done'
          
          # Run smoke tests
          echo "🧪 Running smoke tests..."
          curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1
          curl -f ${{ secrets.STAGING_URL }}/analytics/health || exit 1
          curl -f ${{ secrets.STAGING_URL }}/ || exit 1
          
          echo "✅ Staging deployment completed!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          
          # Create deployment notification
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-type: application/json" \
            -d '{
              "text": "🚀 Starting production deployment...",
              "channel": "deployments"
            }' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
          
          # Deploy with zero-downtime
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROD_DEPLOY_TOKEN }}" \
            -H "Content-type: application/json" \
            -d '{
              "image_tag": "${{ needs.test-and-build.outputs.image-tag }}",
              "environment": "production",
              "commit_sha": "${{ github.sha }}",
              "strategy": "blue_green"
            }' \
            ${{ secrets.PROD_DEPLOY_API_URL }}
          
          # Wait for deployment completion
          echo "⏳ Waiting for production deployment..."
          timeout 600 bash -c 'until curl -f ${{ secrets.PROD_API_URL }}/api/health; do sleep 15; done'
          
          # Run comprehensive health checks
          echo "🏥 Running comprehensive health checks..."
          if curl -f ${{ secrets.PROD_API_URL }}/api/health && \
             curl -f ${{ secrets.PROD_ANALYTICS_URL }}/health && \
             curl -f ${{ secrets.PROD_FRONTEND_URL }}/; then
            echo "✅ Production deployment successful!"
            
            # Send success notification
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-type: application/json" \
              -d '{
                "text": "✅ Production deployment completed successfully!",
                "channel": "deployments"
              }' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          else
            echo "❌ Production deployment verification failed!"
            
            # Send failure notification and trigger rollback
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-type: application/json" \
              -d '{
                "text": "❌ Production deployment failed - initiating rollback...",
                "channel": "deployments"
              }' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
            
            # Trigger rollback
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.PROD_DEPLOY_TOKEN }}" \
              -H "Content-type: application/json" \
              -d '{
                "action": "rollback",
                "environment": "production"
              }' \
              ${{ secrets.PROD_DEPLOY_API_URL }}
            
            exit 1
          fi

  rollback:
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production
    environment: production
    
    steps:
      - name: Automatic rollback
        run: |
          echo "🔄 Automatic rollback triggered due to deployment failure..."
          
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROD_DEPLOY_TOKEN }}" \
            -H "Content-type: application/json" \
            -d '{
              "action": "rollback",
              "environment": "production",
              "reason": "deployment_verification_failed"
            }' \
            ${{ secrets.PROD_DEPLOY_API_URL }}
          
          echo "🔄 Rollback initiated!"

  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Cleanup old Docker images
        run: |
          echo "🧹 Cleaning up old Docker images..."
          docker system prune -f
          docker volume prune -f
