global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: '/metrics'
    authorization:
      credentials: 'tu-metrics-token-aqui'

  - job_name: 'analytics'
    static_configs:
      - targets: ['analytics:8000']
    metrics_path: '/metrics'

  # Descomenta cuando añadas los exporters a docker-compose:
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
